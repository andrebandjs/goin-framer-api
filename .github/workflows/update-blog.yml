name: Atualizar blog.json

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependências
        run: npm install

      - name: Gerar blog.json
        env:
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
        run: node gerar-blog-json.mjs

      - name: Commit e push (só se houve mudança)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog.json
          git diff --staged --quiet || git commit -m "chore: atualiza blog.json [$(date -u '+%Y-%m-%d %H:%M UTC')] [skip ci]"
          git push
